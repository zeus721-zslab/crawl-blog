name: Deploy crawl-blog

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: /home/crawl-blog

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_ACTOR,GITHUB_TOKEN,GITHUB_REPOSITORY
          script: |
            cd ${{ env.DEPLOY_PATH }}
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            GITHUB_REPOSITORY=$GITHUB_REPOSITORY docker compose -f docker-compose.crawl-blog.yml pull
            GITHUB_REPOSITORY=$GITHUB_REPOSITORY docker compose -f docker-compose.crawl-blog.yml up -d --remove-orphans
            docker image prune -f
